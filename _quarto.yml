# ============================================================
# Nguyên lý Quản lý Kinh tế (DTU301) — Học liệu mở FTU
# Quarto Website project
# ============================================================

project:
  type: website
  output-dir: _site
  resources:
    - "data/"

execute:
  freeze: auto      # không re-run code chưa đổi → render nhanh
  echo: true        # mặc định hiện code cho sinh viên đọc
  warning: false

# Stata code chạy với cwd = thư mục project
execute-dir: project

# ----- Site config -----
website:
  title: "Nguyên lý Quản lý Kinh tế (DTU301)"
  description: "Học liệu mở môn DTU301 — Nguyên lý Quản lý Kinh tế. Bộ môn Kinh tế và Quản lý, Viện Kinh tế và Kinh doanh Quốc tế, Trường ĐH Ngoại Thương."
  search:
    location: navbar
    type: overlay
    copy-button: true

  navbar:
    background: primary
    pinned: true
    left:
      - href: index.qmd
        text: "Trang chủ"
      - href: syllabus.qmd
        text: "Đề cương"
      - href: schedule.qmd
        text: "Lịch học"
      - href: lectures/index.qmd
        text: "Bài giảng"
      - href: stata-lab/index.qmd
        text: "Stata Lab"
      - href: problem-sets/index.qmd
        text: "Tiểu luận / Bài tập"
      - href: exams/index.qmd
        text: "Đánh giá"

  sidebar:
    - id: stata-lab
      title: "Stata Lab"
      style: docked
      align: left
      collapse-level: 2
      contents:
        - text: "← Trang chủ"
          href: index.qmd
        - stata-lab/index.qmd
        - section: "Hướng dẫn"
          contents:
            - stata-lab/lab-00.qmd
        - section: "Lab theo buổi"
          contents:
            - stata-lab/lab-01.qmd
            - stata-lab/lab-02.qmd
            - stata-lab/lab-03.qmd
            - stata-lab/lab-04.qmd
            - stata-lab/lab-05.qmd
            - stata-lab/lab-06.qmd
            - stata-lab/lab-07.qmd
            - stata-lab/lab-08.qmd
            - stata-lab/lab-09.qmd
            - stata-lab/lab-10.qmd
            - stata-lab/lab-11.qmd
            - stata-lab/lab-12.qmd
            - stata-lab/lab-13.qmd
            - stata-lab/lab-14.qmd
            - stata-lab/lab-15.qmd
    - id: bai-giang
      title: "Bài giảng"
      style: docked
      align: left
      collapse-level: 2
      contents:
        - text: "← Trang chủ"
          href: index.qmd
        - section: "Chương 1 — Tổng quan QLKT"
          contents:
            - lectures/buoi-01.qmd
            - lectures/buoi-02.qmd
        - section: "Chương 2 — Ngành và doanh nghiệp"
          contents:
            - lectures/buoi-03.qmd
            - lectures/buoi-04.qmd
            - lectures/buoi-05.qmd
        - section: "Chương 3 — Vĩ mô (KT đóng)"
          contents:
            - lectures/buoi-06.qmd
            - lectures/buoi-07.qmd
            - lectures/buoi-08.qmd
        - section: "Chương 4 — Vĩ mô (KT mở)"
          contents:
            - lectures/buoi-09.qmd
            - lectures/buoi-10.qmd
            - lectures/buoi-11.qmd
        - section: "Chương 5 — Địa phương + Vùng"
          contents:
            - lectures/buoi-12.qmd
            - lectures/buoi-13.qmd
        - section: "Seminar tổng hợp"
          contents:
            - lectures/buoi-14.qmd
            - lectures/buoi-15.qmd

  page-footer:
    border: true
    background: light
    left: |
      © 2026 — Bộ môn Kinh tế và Quản lý, Viện Kinh tế và Kinh doanh Quốc tế, ĐH Ngoại Thương · [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/deed.vi)
    center: "TS. Đỗ Ngọc Kiên — Trưởng Bộ môn"
    right: "Tạo bằng [Quarto](https://quarto.org/)"

# ----- Format -----
format:
  html:
    theme:
      light: [cosmo, styles/custom.scss]
    css: styles/custom.css
    highlight-style: arrow      # Light syntax theme — readable on cream bg
    toc: true
    toc-depth: 3
    toc-title: "Trong bài"
    toc-location: right
    number-sections: false
    code-fold: false
    code-tools: false
    code-link: false
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    link-external-newwindow: true
    link-external-icon: true
    anchor-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    citations-hover: true
    footnotes-hover: true
    lang: vi
    mainfont: "Lora, Georgia, serif"
    monofont: "JetBrains Mono, ui-monospace, monospace"
    fontsize: "1.05rem"
    linestretch: 1.7
    grid:
      sidebar-width: 280px
      body-width: 800px
      margin-width: 220px

lang: vi
